<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animal Mart — Playful Food & Toys for Cats & Dogs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,500&family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* 'Super Starfish' is a commercial display font; Fredoka is the closest playful,
   rounded Google Fonts match. To use the real font instead, @font-face it below and
   change --display to 'Super Starfish'. */
@font-face{
  font-family:'Super Starfish';
  src:local('Super Starfish');
  font-display:swap;
}
:root{
  --blush:#F7B7B5; --blush-soft:#FAD4D2; --blush-deep:#E98A87;
  --cream:#FFF8F4; --cream-2:#FFF1EB; --ink:#3A2E2C; --ink-soft:#7A6A66;
  --white:#ffffff; --mint:#BFE3D4; --sun:#FFE0A3; --shadow:rgba(233,138,135,.18);
  --radius:26px; --radius-lg:40px;
  /* display font: tries Super Starfish (if installed/uploaded), then Fredoka match */
  --display:'Super Starfish','Fredoka','Fraunces',serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--ink);line-height:1.6;overflow-x:hidden}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none}
h1,h2,h3,h4{font-family:var(--display);font-weight:700;line-height:1.05;letter-spacing:-.01em}
.wrap{max-width:1240px;margin:0 auto;padding:0 24px}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--blush-deep);color:#fff;font-weight:800;
  padding:14px 28px;border-radius:50px;font-size:15px;transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .18s;box-shadow:0 8px 20px var(--shadow)}
.btn:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 14px 30px var(--shadow)}
.btn:active{transform:translateY(0) scale(.98)}
.btn.ghost{background:#fff;color:var(--blush-deep);box-shadow:0 6px 16px rgba(0,0,0,.05)}
.btn.sm{padding:10px 20px;font-size:13px}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-weight:800;font-size:12px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--blush-deep);background:var(--cream-2);padding:7px 16px;border-radius:50px}
.pawdot{width:7px;height:7px;border-radius:50%;background:var(--blush-deep);position:relative;display:inline-block}
.pawdot::before,.pawdot::after{content:'';position:absolute;width:3px;height:3px;border-radius:50%;background:var(--blush-deep);top:-3px}
.pawdot::before{left:-1px}.pawdot::after{left:3px}

/* ---------- AD BANNER (closable, image-based) ---------- */
.ad-banner{position:relative;width:100%;background:var(--ink);overflow:hidden;display:flex;justify-content:center;align-items:center;min-height:40px}
.ad-banner .ad-link{display:block;width:100%}
.ad-banner img{width:100%;max-height:160px;object-fit:cover;display:block}
.ad-fallback{background:linear-gradient(100deg,var(--blush-deep),var(--blush))}
.ad-fallback-text{display:none}
.ad-banner.ad-fallback .ad-fallback-text{display:flex;flex-direction:column;align-items:center;gap:2px;color:#fff;text-align:center;padding:14px 50px}
.ad-banner.ad-fallback .ad-fallback-text b{font-family:var(--display);font-size:20px;font-weight:700}
.ad-banner.ad-fallback .ad-fallback-text span{font-weight:700;font-size:13px;opacity:.95}
.ad-close{position:absolute;top:10px;right:14px;z-index:2;background:rgba(255,255,255,.92);color:var(--ink);width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-size:16px;box-shadow:0 4px 12px rgba(0,0,0,.18);transition:.15s}
.ad-close:hover{transform:scale(1.08);background:#fff}
.ad-close .lic{font-size:18px}

/* ---------- TOPBAR / NAV ---------- */
.topbar{background:var(--blush-deep);color:#fff;text-align:center;font-size:13px;font-weight:700;padding:8px;letter-spacing:.02em}
header.nav{position:sticky;top:0;z-index:100;background:rgba(255,248,244,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--cream-2)}
.nav-inner{display:flex;align-items:center;gap:20px;height:74px}
.logo{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:700;font-size:23px;color:var(--ink)}
.logo .mark{width:38px;height:38px;border-radius:12px;background:var(--blush-soft);display:grid;place-items:center;font-size:20px}
.navlinks{display:flex;gap:6px;margin-left:8px}
.navlinks a{font-weight:700;font-size:15px;padding:9px 15px;border-radius:50px;color:var(--ink-soft);transition:.15s}
.navlinks a:hover,.navlinks a.active{color:var(--blush-deep);background:var(--cream-2)}
.nav-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
.searchbox{display:flex;align-items:center;background:#fff;border:1.5px solid var(--cream-2);border-radius:50px;padding:8px 16px;gap:8px;width:200px;transition:.2s}
.searchbox:focus-within{border-color:var(--blush);width:230px}
.searchbox input{border:none;outline:none;font-family:inherit;font-size:14px;width:100%;background:transparent;color:var(--ink)}
.cartbtn{position:relative;background:var(--cream-2);width:46px;height:46px;border-radius:50%;display:grid;place-items:center;font-size:20px;transition:.18s}
.cartbtn:hover{background:var(--blush-soft);transform:scale(1.06)}
.cart-count{position:absolute;top:-4px;right:-4px;background:var(--blush-deep);color:#fff;font-size:11px;font-weight:800;
  min-width:20px;height:20px;border-radius:50%;display:grid;place-items:center;padding:0 5px}
.hamburger{display:none;background:var(--cream-2);width:46px;height:46px;border-radius:50%;font-size:20px}
.adminlink{font-size:13px;font-weight:800;color:var(--ink-soft)}

/* ---------- HERO ---------- */
.hero{position:relative;padding:64px 0 40px;overflow:hidden}
.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:40px;align-items:center}
.hero h1{font-size:clamp(40px,6vw,72px);margin:18px 0}
.hero h1 .wink{color:var(--blush-deep);font-style:italic;font-weight:500}
.hero p.lead{font-size:19px;color:var(--ink-soft);max-width:480px;font-weight:600}
.hero-cta{display:flex;gap:14px;margin-top:28px;flex-wrap:wrap}
.hero-stats{display:flex;gap:30px;margin-top:36px}
.hero-stats .s b{font-family:'Fraunces';font-size:30px;color:var(--blush-deep);display:block}
.hero-stats .s span{font-size:13px;font-weight:700;color:var(--ink-soft)}
.hero-art{position:relative}
.hero-art .blob{position:absolute;inset:-6% -4%;background:var(--blush-soft);border-radius:46% 54% 58% 42%/52% 44% 56% 48%;z-index:0;animation:morph 9s ease-in-out infinite}
@keyframes morph{0%,100%{border-radius:46% 54% 58% 42%/52% 44% 56% 48%}50%{border-radius:58% 42% 44% 56%/46% 58% 42% 54%}}
.hero-art img{position:relative;z-index:1;border-radius:34px;width:100%;height:460px;object-fit:cover;box-shadow:0 30px 60px var(--shadow)}
.float-card{position:absolute;z-index:2;background:#fff;border-radius:20px;padding:12px 16px;box-shadow:0 16px 36px rgba(0,0,0,.1);display:flex;align-items:center;gap:10px;font-weight:800;font-size:14px}
.float-card.one{bottom:26px;left:-18px;animation:bob 4s ease-in-out infinite}
.float-card.two{top:30px;right:-14px;animation:bob 4s ease-in-out infinite .8s}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.float-card .ic{width:34px;height:34px;border-radius:10px;background:var(--cream-2);display:grid;place-items:center;font-size:18px}

/* ---------- CATEGORY STRIP ---------- */
.section{padding:64px 0}
.sec-head{text-align:center;max-width:620px;margin:0 auto 44px}
.sec-head h2{font-size:clamp(30px,4vw,46px);margin:14px 0 10px}
.sec-head p{color:var(--ink-soft);font-weight:600;font-size:17px}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.cat-card{background:#fff;border-radius:var(--radius);padding:22px;text-align:center;transition:.2s;border:2px solid transparent;cursor:pointer}
.cat-card:hover{transform:translateY(-6px);border-color:var(--blush-soft);box-shadow:0 18px 36px var(--shadow)}
.cat-card .thumb{width:100%;height:130px;border-radius:18px;object-fit:cover;margin-bottom:14px}
.cat-card h4{font-size:18px}.cat-card span{font-size:13px;color:var(--ink-soft);font-weight:700}

/* ---------- PRODUCT CARD ---------- */
.prod-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px}
.pcard{background:#fff;border-radius:var(--radius);overflow:hidden;transition:.2s;position:relative;display:flex;flex-direction:column}
.pcard:hover{transform:translateY(-6px);box-shadow:0 20px 40px var(--shadow)}
.pcard .imgwrap{position:relative;aspect-ratio:1;overflow:hidden;cursor:pointer;background:var(--cream-2)}
.pcard .imgwrap img{width:100%;height:100%;object-fit:cover;transition:.4s}
.pcard:hover .imgwrap img{transform:scale(1.07)}
.badge{position:absolute;top:12px;left:12px;background:var(--blush-deep);color:#fff;font-size:11px;font-weight:800;padding:5px 11px;border-radius:50px;z-index:2}
.badge.sold{top:auto;bottom:12px;background:rgba(58,46,44,.82);left:12px}
.pcard .body{padding:16px 18px 18px;display:flex;flex-direction:column;flex:1}
.pcard .cat-tag{font-size:11px;font-weight:800;color:var(--blush-deep);text-transform:uppercase;letter-spacing:.08em}
.pcard h3{font-size:17px;margin:5px 0 8px;line-height:1.15;cursor:pointer}
.pcard h3:hover{color:var(--blush-deep)}
.stars{color:var(--blush-deep);font-size:13px;letter-spacing:1px;margin-bottom:8px}
.stars .muted{color:var(--cream-2)}
.priceline{display:flex;align-items:baseline;gap:8px;margin-top:auto}
.priceline .now{font-family:'Fraunces';font-weight:900;font-size:20px;color:var(--ink)}
.priceline .old{font-size:14px;color:var(--ink-soft);text-decoration:line-through}
.pcard .add{margin-top:14px;width:100%;justify-content:center;background:var(--cream-2);color:var(--blush-deep)}
.pcard .add:hover{background:var(--blush-deep);color:#fff}

/* ---------- REVIEWS ---------- */
.rev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.rev-card{background:#fff;border-radius:var(--radius);padding:26px;box-shadow:0 10px 30px rgba(0,0,0,.04)}
.rev-card .stars{font-size:15px}
.rev-card p{font-weight:600;color:var(--ink);margin:10px 0 16px;font-size:15px}
.rev-meta{display:flex;align-items:center;gap:12px}
.rev-meta .av{width:44px;height:44px;border-radius:50%;background:var(--blush-soft);display:grid;place-items:center;font-family:'Fraunces';font-weight:900;color:var(--blush-deep);font-size:18px}
.rev-meta b{display:block;font-size:15px}.rev-meta span{font-size:12px;color:var(--mint);font-weight:800}
.rev-meta span.v{color:#3Fae8b}

/* ---------- ARTICLES ---------- */
.art-feature{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;margin-bottom:24px}
.art-big{position:relative;border-radius:var(--radius-lg);overflow:hidden;min-height:320px;display:flex;align-items:flex-end;cursor:pointer}
.art-big img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:.4s}
.art-big:hover img{transform:scale(1.05)}
.art-big::after{content:'';position:absolute;inset:0;background:linear-gradient(transparent 30%,rgba(58,46,44,.85))}
.art-big .ov{position:relative;z-index:1;padding:30px;color:#fff}
.art-big .ov .tag{background:var(--blush-deep);font-size:11px;font-weight:800;padding:5px 13px;border-radius:50px;text-transform:uppercase;letter-spacing:.08em}
.art-big .ov h3{color:#fff;font-size:26px;margin:14px 0 8px}
.art-big .ov p{font-weight:600;opacity:.9;font-size:15px}
.art-list{display:grid;gap:16px}
.art-row{display:flex;gap:16px;background:#fff;border-radius:var(--radius);padding:14px;align-items:center;transition:.18s;cursor:pointer}
.art-row:hover{transform:translateX(6px);box-shadow:0 12px 28px var(--shadow)}
.art-row img{width:110px;height:90px;border-radius:16px;object-fit:cover;flex-shrink:0}
.art-row .tag{font-size:11px;font-weight:800;color:var(--blush-deep);text-transform:uppercase;letter-spacing:.08em}
.art-row h4{font-size:17px;margin:4px 0}.art-row span{font-size:12px;color:var(--ink-soft);font-weight:700}

/* ---------- TRUST ---------- */
.trust{background:var(--cream-2);border-radius:var(--radius-lg);padding:48px 30px;display:grid;grid-template-columns:repeat(4,1fr);gap:24px;text-align:center}
.trust .t .ic{width:60px;height:60px;border-radius:18px;background:#fff;display:grid;place-items:center;font-size:26px;margin:0 auto 14px;box-shadow:0 8px 18px var(--shadow)}
.trust .t b{font-family:'Fraunces';font-size:18px;display:block;margin-bottom:4px}
.trust .t span{font-size:14px;color:var(--ink-soft);font-weight:600}

/* ---------- FOOTER ---------- */
footer{background:var(--ink);color:#fff;padding:60px 0 30px;margin-top:70px}
.foot-grid{display:grid;grid-template-columns:1.6fr 1fr 1fr 1.4fr;gap:40px;margin-bottom:40px}
footer .logo{color:#fff}footer .logo .mark{background:rgba(255,255,255,.12)}
footer p.fdesc{color:rgba(255,255,255,.65);font-weight:600;margin-top:16px;font-size:15px;max-width:280px}
footer h5{font-family:'Fraunces';font-size:17px;margin-bottom:16px}
footer ul{list-style:none}footer li{margin-bottom:10px}
footer a{color:rgba(255,255,255,.65);font-weight:600;font-size:14px;transition:.15s}
footer a:hover{color:var(--blush)}
.news input{width:100%;padding:13px 16px;border-radius:50px;border:none;font-family:inherit;margin-bottom:10px;outline:none}
.foot-bot{border-top:1px solid rgba(255,255,255,.12);padding-top:24px;text-align:center;color:rgba(255,255,255,.5);font-size:13px;font-weight:600}

/* ---------- PAGE: PRODUCTS LISTING ---------- */
.page-head{background:var(--cream-2);padding:48px 0;text-align:center}
.page-head h1{font-size:clamp(34px,5vw,52px)}
.page-head p{color:var(--ink-soft);font-weight:600;margin-top:10px;font-size:17px}
.shop-layout{display:grid;grid-template-columns:230px 1fr;gap:34px;padding:44px 0}
.filters{position:sticky;top:90px;align-self:start}
.filters h4{font-size:15px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;color:var(--ink-soft)}
.filter-pill{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid var(--cream-2);padding:11px 16px;border-radius:50px;
  font-weight:700;font-size:14px;margin-bottom:9px;transition:.15s;color:var(--ink-soft)}
.filter-pill:hover{border-color:var(--blush)}
.filter-pill.on{background:var(--blush-deep);color:#fff;border-color:var(--blush-deep)}
.shop-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.shop-top .count{font-weight:800;color:var(--ink-soft)}
.shop-search{display:flex;align-items:center;background:#fff;border:1.5px solid var(--cream-2);border-radius:50px;padding:10px 18px;gap:8px;width:280px}
.shop-search input{border:none;outline:none;font-family:inherit;font-size:14px;width:100%;background:transparent}
.empty{text-align:center;padding:60px;color:var(--ink-soft);font-weight:700}

/* ---------- PAGE: PRODUCT DETAIL ---------- */
.pdp{display:grid;grid-template-columns:1fr 1fr;gap:48px;padding:48px 0}
.pdp .gallery{border-radius:var(--radius-lg);overflow:hidden;background:var(--cream-2);aspect-ratio:1}
.pdp .gallery img{width:100%;height:100%;object-fit:cover}
.pdp .info .cat-tag{color:var(--blush-deep);font-weight:800;text-transform:uppercase;letter-spacing:.1em;font-size:13px}
.pdp .info h1{font-size:clamp(30px,4vw,44px);margin:10px 0 14px}
.pdp .price-big{display:flex;align-items:baseline;gap:12px;margin:20px 0}
.pdp .price-big .now{font-family:'Fraunces';font-size:36px;font-weight:900;color:var(--blush-deep)}
.pdp .price-big .old{font-size:20px;color:var(--ink-soft);text-decoration:line-through}
.pdp .price-big .save{background:var(--mint);color:#1f6b50;font-weight:800;font-size:13px;padding:5px 12px;border-radius:50px}
.pdp .desc{color:var(--ink-soft);font-weight:600;font-size:16px;margin:16px 0 24px}
.qty{display:inline-flex;align-items:center;background:#fff;border:1.5px solid var(--cream-2);border-radius:50px;overflow:hidden;margin-right:14px}
.qty button{width:42px;height:46px;background:transparent;font-size:20px;color:var(--blush-deep);font-weight:800}
.qty span{width:42px;text-align:center;font-weight:800}
.pdp-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.pdp-feats{display:flex;gap:20px;margin-top:28px;flex-wrap:wrap}
.pdp-feats .f{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;color:var(--ink-soft)}

/* ---------- CART DRAWER ---------- */
.overlay{position:fixed;inset:0;background:rgba(58,46,44,.45);z-index:200;opacity:0;visibility:hidden;transition:.25s}
.overlay.open{opacity:1;visibility:visible}
.drawer{position:fixed;top:0;right:0;height:100%;width:420px;max-width:92vw;background:var(--cream);z-index:201;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer-head{padding:24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--cream-2)}
.drawer-head h3{font-size:22px}
.drawer-close{background:var(--cream-2);width:40px;height:40px;border-radius:50%;font-size:18px}
.drawer-body{flex:1;overflow-y:auto;padding:20px 24px}
.cart-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--cream-2)}
.cart-item img{width:74px;height:74px;border-radius:16px;object-fit:cover}
.cart-item .ci-info{flex:1}
.cart-item h4{font-size:15px;margin-bottom:4px}
.cart-item .ci-price{color:var(--blush-deep);font-weight:800;font-size:15px}
.ci-controls{display:flex;align-items:center;gap:10px;margin-top:8px}
.ci-controls .q{display:flex;align-items:center;gap:8px;background:#fff;border-radius:50px;padding:3px}
.ci-controls .q button{width:26px;height:26px;border-radius:50%;background:var(--cream-2);font-weight:800;color:var(--blush-deep)}
.ci-remove{font-size:12px;color:var(--ink-soft);font-weight:700;background:none;text-decoration:underline}
.drawer-foot{padding:22px 24px;border-top:1px solid var(--cream-2);background:#fff}
.drawer-foot .row{display:flex;justify-content:space-between;font-weight:700;margin-bottom:8px;color:var(--ink-soft)}
.drawer-foot .row.total{font-family:'Fraunces';font-size:22px;font-weight:900;color:var(--ink);margin:12px 0 18px}
.cart-empty{text-align:center;padding:50px 20px;color:var(--ink-soft)}
.cart-empty .big{font-size:50px;margin-bottom:12px}

/* ---------- CHECKOUT ---------- */
.checkout{display:grid;grid-template-columns:1.3fr .9fr;gap:40px;padding:44px 0}
.co-card{background:#fff;border-radius:var(--radius);padding:30px;margin-bottom:22px}
.co-card h3{font-size:21px;margin-bottom:6px}
.co-card .sub{color:var(--ink-soft);font-weight:600;font-size:14px;margin-bottom:20px}
.field{margin-bottom:16px}
.field label{display:block;font-weight:800;font-size:13px;margin-bottom:7px}
.field input,.field textarea,.field select{width:100%;padding:13px 16px;border:1.5px solid var(--cream-2);border-radius:14px;
  font-family:inherit;font-size:15px;outline:none;transition:.15s;background:var(--cream)}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--blush)}
.field.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pay-options{display:grid;gap:12px}
.pay-opt{display:flex;align-items:center;gap:14px;border:2px solid var(--cream-2);border-radius:16px;padding:16px;cursor:pointer;transition:.15s}
.pay-opt:hover{border-color:var(--blush-soft)}
.pay-opt.on{border-color:var(--blush-deep);background:var(--cream-2)}
.pay-opt .logo-badge{width:54px;height:40px;border-radius:10px;display:grid;place-items:center;font-weight:900;font-size:13px;color:#fff;flex-shrink:0}
.pay-opt b{display:block;font-size:15px}.pay-opt span{font-size:13px;color:var(--ink-soft);font-weight:600}
.pay-detail{background:var(--cream-2);border-radius:14px;padding:18px;margin-top:14px;font-size:14px;font-weight:600;color:var(--ink-soft)}
.pay-detail b{color:var(--ink)}
.summary{position:sticky;top:90px;align-self:start;background:#fff;border-radius:var(--radius);padding:28px}
.summary h3{font-size:20px;margin-bottom:18px}
.sum-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--cream-2);align-items:center}
.sum-item img{width:54px;height:54px;border-radius:12px;object-fit:cover}
.sum-item .si-name{flex:1;font-weight:700;font-size:14px}
.sum-item .si-qty{font-size:12px;color:var(--ink-soft);font-weight:700}
.sum-item .si-price{font-weight:800;font-size:14px}
.sum-row{display:flex;justify-content:space-between;font-weight:700;color:var(--ink-soft);margin:10px 0}
.sum-row.total{font-family:'Fraunces';font-size:24px;font-weight:900;color:var(--ink);border-top:1px solid var(--cream-2);padding-top:14px;margin-top:14px}

/* ---------- ORDER CONFIRMATION ---------- */
.confirm{max-width:640px;margin:0 auto;text-align:center;padding:60px 24px}
.confirm .check{width:90px;height:90px;border-radius:50%;background:var(--mint);display:grid;place-items:center;font-size:46px;margin:0 auto 24px;animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
.confirm h1{font-size:40px;margin-bottom:12px}
.confirm .oid{display:inline-block;background:var(--cream-2);padding:8px 20px;border-radius:50px;font-weight:800;color:var(--blush-deep);margin:8px 0 18px}
.confirm p{color:var(--ink-soft);font-weight:600;font-size:16px;margin-bottom:8px}
.notif-row{display:flex;gap:14px;justify-content:center;margin:28px 0;flex-wrap:wrap}
.notif-chip{background:#fff;border-radius:16px;padding:14px 20px;display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px;box-shadow:0 8px 20px rgba(0,0,0,.05)}
.notif-chip .dot{width:9px;height:9px;border-radius:50%;background:var(--mint)}

/* ---------- ADMIN ---------- */
.admin-shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.admin-side{background:var(--ink);color:#fff;padding:28px 18px;position:sticky;top:0;height:100vh}
.admin-side .logo{color:#fff;margin-bottom:34px}.admin-side .logo .mark{background:rgba(255,255,255,.12)}
.admin-nav button{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:none;color:rgba(255,255,255,.7);
  font-weight:700;font-size:15px;padding:13px 16px;border-radius:14px;margin-bottom:6px;transition:.15s}
.admin-nav button:hover{background:rgba(255,255,255,.08);color:#fff}
.admin-nav button.on{background:var(--blush-deep);color:#fff}
.admin-main{padding:34px 40px;background:var(--cream);overflow-y:auto;max-height:100vh}
.admin-main h1{font-size:32px;margin-bottom:4px}
.admin-main .muted{color:var(--ink-soft);font-weight:600;margin-bottom:28px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:32px}
.stat-card{background:#fff;border-radius:20px;padding:22px}
.stat-card .l{font-size:13px;font-weight:800;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em}
.stat-card .v{font-family:'Fraunces';font-size:32px;font-weight:900;margin-top:6px}
.stat-card .v.pink{color:var(--blush-deep)}
.adtable{background:#fff;border-radius:20px;overflow:hidden;width:100%;border-collapse:collapse}
.adtable th{text-align:left;padding:15px 18px;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);background:var(--cream-2)}
.adtable td{padding:14px 18px;border-top:1px solid var(--cream-2);font-weight:600;font-size:14px;vertical-align:middle}
.adtable img{width:46px;height:46px;border-radius:10px;object-fit:cover}
.tag-pill{font-size:11px;font-weight:800;padding:4px 11px;border-radius:50px}
.tag-pill.green{background:#d6f3e6;color:#1f6b50}
.tag-pill.amber{background:#ffeccc;color:#9a6b14}
.tag-pill.pink{background:var(--blush-soft);color:var(--blush-deep)}
.ic-btn{background:var(--cream-2);width:34px;height:34px;border-radius:9px;font-size:15px;margin-right:5px;transition:.15s}
.ic-btn:hover{background:var(--blush-soft)}
.ic-btn.del:hover{background:#ffd9d7}
.admin-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:14px;flex-wrap:wrap}
.admin-search{display:flex;align-items:center;background:#fff;border:1.5px solid var(--cream-2);border-radius:50px;padding:10px 18px;gap:8px;width:260px}
.admin-search input{border:none;outline:none;font-family:inherit;width:100%;background:transparent;font-size:14px}

/* ---------- MODAL ---------- */
.modal-ov{position:fixed;inset:0;background:rgba(58,46,44,.5);z-index:300;display:none;place-items:center;padding:20px}
.modal-ov.open{display:grid}
.modal{background:var(--cream);border-radius:var(--radius);padding:30px;width:540px;max-width:100%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:24px;margin-bottom:20px}
.modal-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:8px}

/* ---------- TOAST ---------- */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:400;display:flex;flex-direction:column;gap:10px;align-items:center}
.toast{background:var(--ink);color:#fff;padding:14px 24px;border-radius:50px;font-weight:700;font-size:15px;
  box-shadow:0 14px 34px rgba(0,0,0,.2);display:flex;align-items:center;gap:10px;animation:toastin .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes toastin{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast .dot{width:9px;height:9px;border-radius:50%;background:var(--mint)}

/* ---------- LOGIN ---------- */
.login-wrap{min-height:80vh;display:grid;place-items:center;padding:40px 20px}
.login-card{background:#fff;border-radius:var(--radius-lg);padding:44px;width:420px;max-width:100%;text-align:center;box-shadow:0 24px 60px var(--shadow)}
.login-card .mark{width:60px;height:60px;border-radius:18px;background:var(--blush-soft);display:grid;place-items:center;font-size:30px;margin:0 auto 18px}
.login-card h2{font-size:28px;margin-bottom:6px}
.login-card p{color:var(--ink-soft);font-weight:600;margin-bottom:24px}
.login-hint{background:var(--cream-2);border-radius:12px;padding:12px;font-size:13px;font-weight:700;color:var(--ink-soft);margin-top:18px}

/* ---------- RESPONSIVE ---------- */
@media(max-width:980px){
  .hero-grid,.pdp,.checkout,.art-feature{grid-template-columns:1fr}
  .cat-grid,.prod-grid{grid-template-columns:repeat(2,1fr)}
  .rev-grid,.trust,.stat-grid{grid-template-columns:repeat(2,1fr)}
  .navlinks,.searchbox{display:none}
  .hamburger{display:grid}
  .shop-layout{grid-template-columns:1fr}
  .filters{position:static}
  .filter-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px}
  .filter-pill{white-space:nowrap;margin-bottom:0}
  .admin-shell{grid-template-columns:1fr}
  .admin-side{position:static;height:auto}
  .admin-nav{display:flex;gap:6px;overflow-x:auto}
  .admin-nav button{white-space:nowrap}
  .foot-grid{grid-template-columns:1fr 1fr}
  .hero-art img{height:340px}
}
@media(max-width:560px){
  .cat-grid,.prod-grid,.rev-grid,.trust,.stat-grid,.foot-grid{grid-template-columns:1fr}
  .wrap{padding:0 18px}
}
.mobile-menu{display:none;position:fixed;inset:0;z-index:150;background:var(--cream);padding:30px}
.mobile-menu.open{display:block}
.mobile-menu .mm-close{position:absolute;top:24px;right:24px;font-size:26px;background:var(--cream-2);width:46px;height:46px;border-radius:50%}
.mobile-menu a{display:block;font-family:var(--display);font-size:26px;font-weight:700;padding:16px 0;border-bottom:1px solid var(--cream-2)}
.fade-in{animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ---------- ICONS (Lucide, themeable via currentColor) ---------- */
.lic{display:inline-flex;align-items:center;justify-content:center;line-height:0;vertical-align:middle}
.lic svg{width:1em;height:1em;stroke-width:2.2}
.float-card .ic .lic svg,.float-card .ic{font-size:18px}
.float-card .ic .lic{color:var(--blush-deep)}
.trust .t .ic .lic{color:var(--blush-deep);font-size:26px}
.logo .mark .lic{color:var(--blush-deep);font-size:20px}
.cartbtn .lic,.searchbox .lic{color:var(--ink)}
.adminlink .lic,.navlinks .lic{color:inherit}
.pdp-feats .f .lic,.foot-feat .lic{color:var(--blush-deep);font-size:16px}
.notif-chip .lic{color:var(--blush-deep);font-size:16px}
.confirm .check .lic{color:#1f6b50;font-size:42px}
.cart-empty .big .lic{color:var(--blush);font-size:50px}
.ic-btn .lic{color:var(--ink-soft);font-size:15px}
.admin-side nav button .lic{font-size:16px;margin-right:2px;color:inherit}
.starline .lic{color:#f5a623;font-size:1em}
.rate-star{color:#f5a623}.rate-star.empty{color:var(--cream-2)}

/* ---------- TRACKING ---------- */
.track-wrap{max-width:760px;margin:0 auto}
.track-search{display:flex;gap:10px;margin:20px 0 30px;flex-wrap:wrap}
.track-search input{flex:1;min-width:200px;border:1.5px solid var(--cream-2);border-radius:50px;padding:14px 22px;font-family:inherit;font-size:15px;outline:none}
.track-search input:focus{border-color:var(--blush)}
.track-card{background:#fff;border-radius:var(--radius);padding:28px;box-shadow:0 10px 30px rgba(0,0,0,.05);margin-bottom:20px}
.track-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:8px}
.track-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:13px;color:var(--ink-soft);font-weight:700;margin-bottom:18px}
.track-meta span{background:var(--cream-2);padding:5px 12px;border-radius:50px}
.timeline{position:relative;padding-left:34px;margin-top:6px}
.timeline::before{content:'';position:absolute;left:11px;top:6px;bottom:6px;width:2px;background:var(--cream-2)}
.tl-step{position:relative;padding-bottom:22px}
.tl-step:last-child{padding-bottom:0}
.tl-dot{position:absolute;left:-34px;top:0;width:24px;height:24px;border-radius:50%;background:var(--cream-2);color:var(--ink-soft);display:grid;place-items:center;z-index:1}
.tl-dot .lic{font-size:13px}
.tl-step.done .tl-dot{background:var(--mint);color:#1f6b50}
.tl-step.current .tl-dot{background:var(--blush-deep);color:#fff;box-shadow:0 0 0 5px var(--blush-soft)}
.tl-step b{font-size:15px}
.tl-step .tl-sub{font-size:13px;color:var(--ink-soft);font-weight:600}
.tl-step.pending b,.tl-step.pending .tl-sub{opacity:.5}

/* ---------- RECEIPT / PARCEL TAG (print) ---------- */
.doc-sheet{background:#fff;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.08);padding:34px;max-width:600px;margin:0 auto}
.receipt-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px dashed var(--cream-2);padding-bottom:18px;margin-bottom:18px}
.receipt-logo{display:flex;align-items:center;gap:10px;font-family:'Fraunces';font-weight:900;font-size:22px}
.receipt-logo .mark{width:36px;height:36px;border-radius:10px;background:var(--blush-soft);display:grid;place-items:center;color:var(--blush-deep);font-size:18px}
.rc-row{display:flex;justify-content:space-between;padding:7px 0;font-weight:600;font-size:14px}
.rc-row.total{border-top:2px solid var(--ink);margin-top:10px;padding-top:12px;font-family:'Fraunces';font-weight:900;font-size:19px}
.rc-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;font-size:13px;margin:8px 0 18px}
.rc-grid div span{color:var(--ink-soft);font-weight:700;display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.rc-grid div b{font-weight:800}
.doc-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:22px}

/* Parcel tag */
.parcel-tag{border:2.5px solid var(--ink);border-radius:14px;padding:0;max-width:520px;margin:0 auto;overflow:hidden;background:#fff}
.pt-band{background:var(--ink);color:#fff;display:flex;justify-content:space-between;align-items:center;padding:12px 20px;font-family:'Fraunces';font-weight:900;font-size:17px}
.pt-band .pt-id{font-family:'Nunito';font-size:14px;font-weight:800;letter-spacing:.04em}
.pt-body{padding:20px}
.pt-section{margin-bottom:16px}
.pt-section .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.pt-section .val{font-size:16px;font-weight:800;line-height:1.4}
.pt-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.pt-foot{border-top:2px dashed var(--ink);display:flex;justify-content:space-between;align-items:center;padding:14px 20px;font-weight:800;font-size:13px}
.pt-cod{background:var(--sun);border:2px solid var(--ink);border-radius:10px;padding:8px 14px;font-weight:900;font-family:'Fraunces';font-size:16px}
.barcode{height:46px;background:repeating-linear-gradient(90deg,var(--ink) 0 2px,#fff 2px 4px,var(--ink) 4px 7px,#fff 7px 9px,var(--ink) 9px 12px,#fff 12px 13px);border-radius:4px;margin-top:6px}

@media print{
  body *{visibility:hidden}
  #printArea,#printArea *{visibility:visible}
  #printArea{position:absolute;left:0;top:0;width:100%;padding:10px}
  .doc-actions,.no-print{display:none!important}
  .doc-sheet,.parcel-tag{box-shadow:none;margin:0}
}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast-wrap" id="toasts"></div>

<!-- Cart Drawer -->
<div class="overlay" id="cartOverlay" onclick="App.closeCart()"></div>
<div class="drawer" id="cartDrawer">
  <div class="drawer-head">
    <h3>Your Basket</h3>
    <button class="drawer-close" onclick="App.closeCart()"><i data-lucide="x" class="lic"></i></button>
  </div>
  <div class="drawer-body" id="cartBody"></div>
  <div class="drawer-foot" id="cartFoot"></div>
</div>

<!-- Admin Modal -->
<div class="modal-ov" id="modalOv">
  <div class="modal" id="modalBox"></div>
</div>

<!-- Lucide: free open-source SVG icon API; icons inherit theme color via currentColor -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
